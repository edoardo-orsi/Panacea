networks:
  panacea-network:
    driver: bridge

volumes:
  timescaledb_data:

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg18
    environment:
      POSTGRES_USER: panacea
      POSTGRES_PASSWORD: panacea
      POSTGRES_DB: panacea
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql   # pg18+: mount parent dir, not /data
    networks:
      - panacea-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U panacea"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    command: "-js -m 8222"
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - panacea-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - panacea-network
    depends_on:
      - timescaledb

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - panacea-network
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
    networks:
      - panacea-network
